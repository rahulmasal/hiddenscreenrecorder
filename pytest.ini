[pytest]
# Pytest configuration for Screen Recorder Application

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    screen_capture: mark test as requiring screen capture hardware
    audio: mark test as requiring audio hardware
    network: mark test as requiring network access
    slow: mark test as slow running

# Verbosity
addopts = -v --tb=short

# Ignore warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 3.8
